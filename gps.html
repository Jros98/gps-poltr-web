<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>GPS POLTR WEB</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 10px;
  gap: 15px;
  box-sizing: border-box;
}

/* PANEL */

.panel {
  width: 100%;
  background: #f8fafc;
  padding: 20px;
  border-radius: 20px;
  box-sizing: border-box;
}

/* TOPBAR */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.topbar h2 {
  margin: 0;
  color: #1e3a8a;
  font-size: 22px;
}

/* ONLINE */

.online {
  background: #c7f0d8;
  color: #0f5132;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}

/* SELECTOR */

.selector{
  margin-bottom:20px;
}

.selector h3{
  margin-bottom:10px;
  color:#1e3a8a;
}

.selector select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #dbeafe;
  margin-bottom:10px;
  font-size:15px;
}

.selector button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#1e3a8a;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

/* TARJETAS */

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: white;
  border: 2px solid #dbeafe;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.08);
}

.card span {
  color: #6b7280;
  font-size: 13px;
}

.card h3 {
  margin-top: 10px;
  color: #1e3a8a;
  font-size: 18px;
}

/* ALERTA */

.alerta {
  margin-top: 15px;
  padding: 14px;
  border-radius: 15px;
  color: white;
  font-weight: bold;
  text-align: center;
  background: gray;
}

/* MAPA */

#map {
  width: 100%;
  height: 60vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="panel">

<div class="topbar">

<h2>GPS POLTR WEB</h2>

<div class="online">
🟢 Sistema activo
</div>

</div>

<!-- SELECTOR -->

<div class="selector">

<h3>Seleccionar vehículo</h3>

<select id="selectorGPS">

<option value="">
Cargando vehículos...
</option>

</select>

<button id="btnIniciar">
Iniciar GPS
</button>

</div>

<!-- TARJETAS -->

<div class="cards">

<div class="card">
<span>Estado</span>
<h3 id="estado">Esperando...</h3>
</div>

<div class="card">
<span>Velocidad</span>
<h3 id="velocidad">0 km/h</h3>
</div>

<div class="card">
<span>Latitud</span>
<h3 id="latitud">0</h3>
</div>

<div class="card">
<span>Longitud</span>
<h3 id="longitud">0</h3>
</div>

</div>

<div class="alerta">
Seleccione un vehículo
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyBQ8LFeSTZp7VUORIlOihsI74bE4wtOoKk",

  authDomain: "sistema-poltr-web.firebaseapp.com",

  projectId: "sistema-poltr-web",

  storageBucket: "sistema-poltr-web.firebasestorage.app",

  messagingSenderId: "348807584589",

  appId: "1:348807584589:web:0016f2ecd2072d90473504"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* MAPA */

const map = L.map('map').setView([5.05, -75.52], 13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'&copy; OpenStreetMap'
}).addTo(map);

let marker;

let gpsSeleccionado = null;

/* LIBERAR GPS AL SALIR */

window.addEventListener("beforeunload", async () => {

if(gpsSeleccionado){

await setDoc(
doc(db,"gpsStatus",gpsSeleccionado),
{
activo:false
}
);

}

});

/* VEHICULOS */

const gpsIDs = [

{
id:"gps1",
nombre:"Vehículo 1"
},

{
id:"gps2",
nombre:"Vehículo 2"
},

{
id:"gps3",
nombre:"Vehículo 3"
}

];

const selector =
document.getElementById("selectorGPS");

/* CARGAR DISPONIBLES */

gpsIDs.forEach((gps)=>{

onSnapshot(doc(db,"gpsStatus",gps.id),(docSnap)=>{

let ocupado = false;

if(docSnap.exists()){

ocupado = docSnap.data().activo;

}

const existe =
document.querySelector(`option[value="${gps.id}"]`);

const texto =
ocupado
? `🔴 ${gps.nombre} ocupado`
: `🟢 ${gps.nombre} disponible`;

if(existe){

existe.innerHTML = texto;

existe.disabled = ocupado;

}else{

const option =
document.createElement("option");

option.value = gps.id;

option.innerHTML = texto;

option.disabled = ocupado;

selector.appendChild(option);

}

});

});

/* INICIAR GPS */

document.getElementById("btnIniciar")
.addEventListener("click", async()=>{

gpsSeleccionado = selector.value;

if(!gpsSeleccionado){

alert("Seleccione un vehículo");

return;

}

/* MARCAR ACTIVO */

await setDoc(
doc(db,"gpsStatus",gpsSeleccionado),
{
activo:true
}
);

/* GPS */

navigator.geolocation.watchPosition(

async(position)=>{

const lat = position.coords.latitude;

const lng = position.coords.longitude;

const speed = position.coords.speed || 0;

const kmh = speed * 3.6;

/* MARCADOR */

if(!marker){

marker = L.marker([lat,lng]).addTo(map);

map.setView([lat,lng],16);

}else{

marker.setLatLng([lat,lng]);

}

/* DATOS */

document.getElementById("latitud").innerHTML =
lat.toFixed(6);

document.getElementById("longitud").innerHTML =
lng.toFixed(6);

document.getElementById("velocidad").innerHTML =
kmh.toFixed(1) + " km/h";

/* ALERTAS */

if(kmh < 1){

document.querySelector(".alerta").innerHTML =
"⚠ Vehículo detenido";

document.querySelector(".alerta").style.background =
"orange";

document.getElementById("estado").innerHTML =
"DETENIDO";

}else if(kmh > 20){

document.querySelector(".alerta").innerHTML =
"⚠ Velocidad alta";

document.querySelector(".alerta").style.background =
"red";

document.getElementById("estado").innerHTML =
"ALERTA";

}else{

document.querySelector(".alerta").innerHTML =
"✅ Vehículo en movimiento";

document.querySelector(".alerta").style.background =
"green";

document.getElementById("estado").innerHTML =
"EN RUTA";

}

/* ENVIAR FIREBASE */

await setDoc(
doc(db,"gps",gpsSeleccionado),
{

latitud: lat,
longitud: lng,
velocidad: kmh,
timestamp: new Date()

}

);

},

(error)=>{

console.error(error);

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

});

</script>

</body>

</html>
