<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Dashboard POLTR WEB</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 10px;
  gap: 15px;
  box-sizing: border-box;
}

/* PANEL */

.panel {
  width: 100%;
  background: #f8fafc;
  padding: 20px;
  border-radius: 20px;
  box-sizing: border-box;
}

/* TOPBAR */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.topbar h2 {
  margin: 0;
  color: #1e3a8a;
  font-size: 22px;
}

/* ONLINE */

.online {
  background: #c7f0d8;
  color: #0f5132;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 14px;
}

/* SELECTOR */

.selector{
  margin-bottom:20px;
}

.selector select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #dbeafe;
  font-size:15px;
}

/* TARJETAS */

.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: white;
  border: 2px solid #dbeafe;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.08);
}

.card span {
  color: #6b7280;
  font-size: 13px;
}

.card h3 {
  margin-top: 10px;
  color: #1e3a8a;
  font-size: 18px;
}

/* ALERTA */

.alerta {
  margin-top: 15px;
  padding: 14px;
  border-radius: 15px;
  color: white;
  font-weight: bold;
  text-align: center;
  background: gray;
}

/* MAPA */

#map {
  width: 100%;
  height: 60vh;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<div class="panel">

<div class="topbar">

<h2>Dashboard POLTR WEB</h2>

<div class="online">
🟢 GPS conectados
</div>

</div>

<!-- SELECTOR GPS -->

<div class="selector">

<select id="selectorGPS">

<option value="gps1">
Dispositivo GPS 1
</option>

<option value="gps2">
Dispositivo GPS 2
</option>

<option value="gps3">
Dispositivo GPS 3
</option>

</select>

</div>

<!-- TARJETAS -->

<div class="cards">

<div class="card">
<span>Estado</span>
<h3 id="estado">Conectando...</h3>
</div>

<div class="card">
<span>Velocidad</span>
<h3 id="velocidad">0 km/h</h3>
</div>

<div class="card">
<span>Latitud</span>
<h3 id="latitud">0</h3>
</div>

<div class="card">
<span>Longitud</span>
<h3 id="longitud">0</h3>
</div>

</div>

<div class="alerta">
Esperando datos GPS...
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  doc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyBQ8LFeSTZp7VUORIlOihsI74bE4wtOoKk",

  authDomain: "sistema-poltr-web.firebaseapp.com",

  projectId: "sistema-poltr-web",

  storageBucket: "sistema-poltr-web.firebasestorage.app",

  messagingSenderId: "348807584589",

  appId: "1:348807584589:web:0016f2ecd2072d90473504"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* MAPA */

const map = L.map('map').setView([5.05, -75.52], 13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'&copy; OpenStreetMap'
}).addTo(map);

/* VARIABLES */

let markers = {};

let gpsSeleccionado = "gps1";

/* GPS DISPONIBLES */

const gpsDisponibles = ["gps1","gps2","gps3"];

/* ICONOS */

const iconoNormal = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',

shadowUrl:
'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',

iconSize:[25,41],
iconAnchor:[12,41]

});

const iconoSeleccionado = L.icon({

iconUrl:
'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

shadowUrl:
'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',

iconSize:[30,45],
iconAnchor:[15,45]

});

/* ESCUCHAR TODOS LOS GPS */

gpsDisponibles.forEach((idGPS)=>{

onSnapshot(doc(db,"gps",idGPS),(docSnap)=>{

if(docSnap.exists()){

const data = docSnap.data();

const lat = data.latitud;

const lng = data.longitud;

const kmh = data.velocidad;

/* CREAR MARCADOR */

if(!markers[idGPS]){

markers[idGPS] = L.marker([lat,lng],{

icon: idGPS === gpsSeleccionado
? iconoSeleccionado
: iconoNormal

}).addTo(map);

}else{

markers[idGPS].setLatLng([lat,lng]);

markers[idGPS].setIcon(

idGPS === gpsSeleccionado
? iconoSeleccionado
: iconoNormal

);

}

/* SI ES EL SELECCIONADO */

if(idGPS === gpsSeleccionado){

map.setView([lat,lng],16);

document.getElementById("latitud").innerHTML =
lat.toFixed(6);

document.getElementById("longitud").innerHTML =
lng.toFixed(6);

document.getElementById("velocidad").innerHTML =
kmh.toFixed(1) + " km/h";

/* ALERTAS */

if(kmh < 1){

document.querySelector(".alerta").innerHTML =
"⚠ Vehículo detenido";

document.querySelector(".alerta").style.background =
"orange";

document.getElementById("estado").innerHTML =
"DETENIDO";

}else if(kmh > 20){

document.querySelector(".alerta").innerHTML =
"⚠ Velocidad alta";

document.querySelector(".alerta").style.background =
"red";

document.getElementById("estado").innerHTML =
"ALERTA";

}else{

document.querySelector(".alerta").innerHTML =
"✅ Vehículo en movimiento";

document.querySelector(".alerta").style.background =
"green";

document.getElementById("estado").innerHTML =
"EN RUTA";

}

}

}

});

});

/* SELECTOR */

document.getElementById("selectorGPS")
.addEventListener("change",(e)=>{

gpsSeleccionado = e.target.value;

/* ACTUALIZAR ICONOS */

gpsDisponibles.forEach((idGPS)=>{

if(markers[idGPS]){

markers[idGPS].setIcon(

idGPS === gpsSeleccionado
? iconoSeleccionado
: iconoNormal

);

}

});

});

</script>

</body>

</html>
